<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>TaskFlow</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="app">
    <header>
      <div class="logo">⚡ TaskFlow</div>
      <span class="date" id="date"></span>
    </header>

    <div class="stats">
      <div class="stat"><span id="total">0</span><small>Total</small></div>
      <div class="stat"><span id="done">0</span><small>Done</small></div>
      <div class="stat"><span id="pending">0</span><small>Pending</small></div>
    </div>

    <div class="input-row">
      <input id="taskInput" type="text" placeholder="Add a new task..." maxlength="80" />
      <select id="priority">
        <option value="low">🟢 Low</option>
        <option value="medium" selected>🟡 Medium</option>
        <option value="high">🔴 High</option>
      </select>
      <button id="addBtn">Add</button>
    </div>

    <div class="filters">
      <button class="filter active" data-f="all">All</button>
      <button class="filter" data-f="active">Active</button>
      <button class="filter" data-f="completed">Completed</button>
    </div>

    <ul id="taskList"></ul>

    <div class="footer">
      <span id="leftCount"></span>
      <button id="clearDone">Clear Completed</button>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
